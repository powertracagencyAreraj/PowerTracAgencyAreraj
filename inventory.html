<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="navModels">ट्रैक्टर मॉडल | Powertrac Agency</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><h2 data-i18n="agencyName">पावरट्रैक एजेंसी</h2></div>
     <nav>
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="navHome">होम</a></li>
                
                <li><a href="inventory.html" data-i18n="navModels">ट्रैक्टर मॉडल</a></li>
                
                <li><a href="services.html" data-i18n="navServices" style="margin: 0 10px; text-decoration: none; color: #333; font-weight: bold;">सेवाएं</a>
                
                <li><a href="contact.html" data-i18n="navContact">संपर्क करें</a></li>
            </ul>
        </nav>
        <div class="nav-actions">
            <button id="lang-btn" class="btn-outline" onclick="toggleLanguage()">English</button>
        </div>
    </header>

    <main class="inventory-section">
        <h1 data-i18n="inventoryTitle" class="section-title">हमारे उपलब्ध ट्रैक्टर्स</h1>
        
        <div id="tractor-grid" class="grid-container">
            <p>Loading tractors...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Call the fetch function when page loads
        window.onload = fetchTractors;
    </script>

    <div id="inquiry-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeInquiry()">&times;</span>
            <h2 data-i18n="inquiryFormTitle">जानकारी प्राप्त करें</h2>
            <p id="modal-tractor-details" class="selected-tractor-text"></p>
            
          <form id="inquiry-form" onsubmit="submitInquiry(event)">
                <input type="hidden" id="tractor-interest">
                
                <input type="text" id="user-name" data-i18n-placeholder="formName" placeholder="आपका नाम" required>
                <input type="tel" id="user-phone" data-i18n-placeholder="formPhone" placeholder="फ़ोन नंबर" required>
                <textarea id="user-address" data-i18n-placeholder="formAddress" placeholder="पूरा पता" rows="3" required></textarea>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;" data-i18n="btnSubmit">सबमिट करें</button>
            </form>
        </div>
    </div>
</body>
</html>
